    category: custom
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"
    internalDependencies:
      - checkbox
      - accordion
    isMultiFile: true
    directory: "event-selector"
    files:
      - "event-selector.tsx"
      - "event-group.tsx"
      - "event-item.tsx"
      - "types.ts"
      - "index.ts"
