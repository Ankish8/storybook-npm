# myOperator UI Component Registry
# This file defines all components, their categories, dependencies, and metadata.
# Run: npm run generate-registry to regenerate registry files from this config.

# =============================================================================
# CATEGORIES
# =============================================================================
# Components are grouped by category for lazy-loading optimization.
# Each category generates a separate registry-{category}.ts file.

categories:
  core:
    description: "Essential UI primitives"
    components:
      - avatar
      - button
      - badge
      - contact-list-item
      - date-divider
      - image-media
      - phone-input
      - reply-quote
      - system-message
      - tabs
      - typography
      - unread-separator

  form:
    description: "Form inputs and controls"
    components:
      - input
      - select
      - checkbox
      - switch
      - text-field
      - textarea
      - select-field
      - multi-select
      - readable-field

  data:
    description: "Data display components"
    components:
      - table

  overlay:
    description: "Popups, modals, menus"
    components:
      - dialog
      - dropdown-menu
      - tooltip
      - delete-confirmation-modal
      - confirmation-modal
      - form-modal

  feedback:
    description: "Status and notifications"
    components:
      - tag
      - alert
      - toast
      - spinner
      - skeleton
      - empty-state

  layout:
    description: "Layout and structure components"
    components:
      - accordion
      - page-header
      - panel
      - pagination

  custom:
    description: "Multi-file complex components"
    components:
      - add-integration
      - switch-account-modal
      - setup-integration
      - attachment-preview
      - audio-media
      - carousel-media
      - chat-bubble
      - chat-composer
      - chat-list-item
      - chat-timeline-divider
      - doc-media
      - event-selector
      - key-value-input
      - api-feature-card
      - endpoint-details
      - alert-configuration
      - auto-pay-setup
      - bank-details
      - date-range-modal
      - payment-option-card
      - plan-upgrade-modal
      - plan-upgrade-summary-modal
      - payment-summary
      - let-us-drive-card
      - power-up-card
      - pricing-card
      - pricing-page
      - pricing-toggle
      - talk-to-us-modal
      - wallet-topup
      - file-upload-modal
      - video-media
      # Bot Config modules (group: "bot-config")
      - bot-functions
      - bot-human-handover
      - bot-instructions
      - bot-integrations
      - bot-knowledge-base
      - bot-follow-ups
      - bot-settings
      - test-ai-bot
      # Chat Template modules (group: "chat")
      - chat-types
      - chat-transport
      - chat-provider
      - chat-sidebar
      - chat-filter-panel
      - chat-new-panel
      - chat-message-list
      - chat-header
      - chat-input
      - chat-template-modal
      - chat-contact-panel
      - chat-template
      - sender-indicator

# =============================================================================
# COMPONENT DEFINITIONS
# =============================================================================
# Each component has: description, dependencies, and optional multi-file config

components:
  # ---------------------------------------------------------------------------
  # CORE COMPONENTS
  # ---------------------------------------------------------------------------
  avatar:
    description: "A versatile avatar component displaying user initials or images with size variants and optional online status indicator"
    category: core
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"

  date-divider:
    description: "A horizontal line with centered date text for separating chat messages by date"
    category: core
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"

  image-media:
    description: "An image display component for chat messages with rounded corners and configurable max height"
    category: core
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"

  phone-input:
    description: "A phone number input with country code prefix, flag emoji, and optional country selector"
    category: core
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"

  reply-quote:
    description: "A quoted message block with blue left border showing sender name and quoted text for reply previews"
    category: core
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"

  system-message:
    description: "A centered system message for chat timelines with bold markdown support"
    category: core
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"

  unread-separator:
    description: "A horizontal divider with unread message count label for chat message lists"
    category: core
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"

  button:
    description: "A customizable button component with variants, sizes, and icons"
    category: core
    dependencies:
      - "@radix-ui/react-slot@^1.2.4"
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"

  badge:
    description: "A status badge component with active, failed, disabled, outline, secondary, and destructive variants"
    category: core
    dependencies:
      - "@radix-ui/react-slot@^1.2.4"
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"

  contact-list-item:
    description: "Contact list item with avatar, name, subtitle, and trailing content"
    category: core
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
    internalDependencies:
      - avatar

  typography:
    description: "A semantic typography component with kind, variant, color, alignment, and truncation support"
    category: core
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"

  # ---------------------------------------------------------------------------
  # FORM COMPONENTS
  # ---------------------------------------------------------------------------
  input:
    description: "A text input component with error and disabled states"
    category: form
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"

  select:
    description: "A select dropdown component built on Radix UI Select"
    category: form
    dependencies:
      - "@radix-ui/react-select@^2.2.6"
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"
      - "tailwindcss-animate"

  checkbox:
    description: "A tri-state checkbox component with label support (checked, unchecked, indeterminate). Built on Radix UI Checkbox."
    category: form
    dependencies:
      - "@radix-ui/react-checkbox@^1.3.3"
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"

  switch:
    description: "A switch/toggle component for boolean inputs with on/off states. Built on Radix UI Switch."
    category: form
    dependencies:
      - "@radix-ui/react-switch@^1.2.6"
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"

  text-field:
    description: "A text field with label, helper text, icons, and validation states"
    category: form
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"

  textarea:
    description: "A multi-line text input with label, error state, helper text, character counter, and resize control"
    category: form
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"

  readable-field:
    description: "A read-only field with copy-to-clipboard functionality. Supports secret mode for sensitive data like API keys."
    category: form
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"

  select-field:
    description: "A select field with label, helper text, and validation states"
    category: form
    dependencies:
      - "@radix-ui/react-select@^2.2.6"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"

  multi-select:
    description: "A multi-select dropdown component with search, badges, and async loading"
    category: form
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"
    internalDependencies:
      - checkbox
      - tooltip

  number-step-field:
    description: "Number input with inline chevron steppers and trailing suffix chip"
    category: form
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"
    internalDependencies:
      - input

  creatable-select:
    description: "A single-value select with type-to-search and type-to-create custom options"
    category: form
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"
      - "tailwindcss-animate"

  creatable-multi-select:
    description: "A multi-value select with chips, type-to-search, and type-to-create custom options"
    category: form
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"
      - "lucide-react"
      - "tailwindcss-animate"

  # ---------------------------------------------------------------------------
  # DATA COMPONENTS
  # ---------------------------------------------------------------------------
  table:
    description: "A composable table component with size variants, loading/empty states, sticky columns, and sorting support"
    category: data
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"

  tabs:
