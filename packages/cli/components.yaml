    category: feedback
    dependencies:
      - "class-variance-authority"
      - "clsx"
      - "tailwind-merge@^2.6.0"

  empty-state:
    description: "Centered empty state with icon, title, description, and optional action buttons"
    category: feedback
    dependencies:
      - "clsx"
      - "tailwind-merge@^2.6.0"

